<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Settings</title>
    <script src="https://app.local/vendor/fluent-web-components.min.js" type="module"></script>
    <link rel="stylesheet" href="https://app.local/css/app.css">
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; color: #1a1a1a; }
        body { display: flex; flex-direction: column; background: #fafafa; }
        .form-scroll { flex: 1; overflow-y: auto; padding: 10px 14px; }
        .btn-bar { flex-shrink: 0; padding: 6px 14px; border-top: 1px solid #e5e5e5;
            background: #f5f5f5; display: flex; align-items: center; gap: 6px; }

        .source-mail, .source-folder { display: none !important; }
        body.type-mail .source-mail { display: flex !important; }
        body.type-folder .source-folder { display: flex !important; }

        .fr { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .fl { font-size: 11px; color: #808080; width: 72px; flex-shrink: 0; }
        .fr-col { display: flex; flex-direction: column; gap: 4px; margin-bottom: 4px; padding-left: 78px; }
        .section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
            color: #a0a0a0; margin: 10px 0 4px; padding-bottom: 4px; border-bottom: 1px solid #eee; }

        fluent-text-field, fluent-select, fluent-number-field { flex: 1; min-width: 0; }
        fluent-text-field::part(root), fluent-select::part(control) { font-size: 12px; }
        fluent-checkbox, fluent-radio { font-size: 12px; }
        fluent-tab-panel { padding: 8px 0 0; }
    </style>
</head>
<body class="type-mail">

<div class="form-scroll">
    <!-- Profile bar -->
    <div class="fr" style="margin-bottom:8px;">
        <fluent-select id="profileSelect" style="flex:1;"></fluent-select>
        <fluent-button size="small" onclick="Settings.addProfile()">+</fluent-button>
        <fluent-button size="small" onclick="Settings.removeProfile()">&minus;</fluent-button>
    </div>

    <div class="fr">
        <span class="fl">Name</span>
        <fluent-text-field id="fName" size="small" style="flex:1;"></fluent-text-field>
    </div>
    <div class="fr">
        <span class="fl">Type</span>
        <fluent-select id="fType" size="small" style="width:100px;flex:none;">
            <fluent-option value="mail">Mail</fluent-option>
            <fluent-option value="folder">Folder</fluent-option>
        </fluent-select>
    </div>
    <div class="fr">
        <span class="fl">Output</span>
        <fluent-text-field id="fOutputRoot" size="small" style="flex:1;"></fluent-text-field>
        <fluent-button size="small" onclick="Settings.browse('output_root')">...</fluent-button>
    </div>
    <div class="fr-col">
        <div style="display:flex;gap:12px;">
            <fluent-checkbox id="fFlat">Flat output</fluent-checkbox>
            <fluent-checkbox id="fShortDirname" id-row="shortDirnameRow">Short names</fluent-checkbox>
        </div>
    </div>

    <!-- Tabs: Source / Filter / Options -->
    <fluent-tabs activeid="tabSource" style="margin-top:4px;">
        <fluent-tab id="tabSource">Source</fluent-tab>
        <fluent-tab id="tabFilter">Filter</fluent-tab>
        <fluent-tab id="tabOptions">Options</fluent-tab>

        <fluent-tab-panel id="tabSourcePanel">
            <div class="fr source-mail">
                <span class="fl">Account</span>
                <fluent-select id="fAccount" size="small" style="flex:1;">
                    <fluent-option value="">(All)</fluent-option>
                </fluent-select>
            </div>
            <div class="fr source-mail">
                <span class="fl">Folder</span>
                <fluent-select id="fOutlookFolder" size="small" style="flex:1;">
                    <fluent-option value="">(All)</fluent-option>
                </fluent-select>
            </div>
            <div class="fr source-folder">
                <span class="fl">Path</span>
                <fluent-text-field id="fSourceFolder" size="small" style="flex:1;"></fluent-text-field>
                <fluent-button size="small" onclick="Settings.browse('source_folder')">...</fluent-button>
            </div>
            <div class="fr-col source-folder">
                <div style="display:flex;gap:12px;">
                    <fluent-checkbox id="fRecurse" checked>Subfolders</fluent-checkbox>
                    <fluent-checkbox id="fAutoUnzip">Unzip</fluent-checkbox>
                </div>
            </div>
        </fluent-tab-panel>

        <fluent-tab-panel id="tabFilterPanel">
            <div class="fr">
                <span class="fl">Since</span>
                <input id="fSince" type="date" style="font-size:12px;padding:4px 8px;border:1px solid #ccc;border-radius:4px;">
            </div>
            <div class="fr">
                <span class="fl">Match</span>
                <fluent-radio-group orientation="horizontal" id="filterModeGroup">
                    <fluent-radio value="or" checked>OR</fluent-radio>
                    <fluent-radio value="and">AND</fluent-radio>
                </fluent-radio-group>
            </div>
            <div class="fr" style="align-items:start;">
                <span class="fl" style="padding-top:6px;">Keywords</span>
                <div style="flex:1;">
                    <div id="filterList" style="border:1px solid #e0e0e0;border-radius:4px;background:#fff;min-height:24px;max-height:60px;overflow-y:auto;padding:2px;margin-bottom:4px;font-size:11px;"></div>
                    <div style="display:flex;gap:4px;">
                        <fluent-text-field id="fNewFilter" size="small" placeholder="keyword..." style="flex:1;"
                            onkeydown="if(event.key==='Enter')Settings.addFilter()"></fluent-text-field>
                        <fluent-button size="small" onclick="Settings.addFilter()">+</fluent-button>
                        <fluent-button size="small" onclick="Settings.removeFilter()">&minus;</fluent-button>
                    </div>
                </div>
            </div>
        </fluent-tab-panel>

        <fluent-tab-panel id="tabOptionsPanel">
            <div style="display:flex;flex-direction:column;gap:6px;">
                <fluent-checkbox id="fNotify" checked>Show notifications on pull</fluent-checkbox>
                <fluent-checkbox id="fLog" checked>Write change log (log.csv)</fluent-checkbox>
                <fluent-checkbox id="fManifestHidden" checked>Hide manifest file</fluent-checkbox>
            </div>
        </fluent-tab-panel>
    </fluent-tabs>
</div>

<!-- Fixed bottom bar -->
<div class="btn-bar">
    <fluent-button size="small" onclick="Settings.importCsv()">Import</fluent-button>
    <fluent-button size="small" onclick="Settings.exportCsv()">Export</fluent-button>
    <fluent-button size="small" appearance="outline" onclick="Settings.resetAll()" style="color:#d32f2f;">Reset</fluent-button>
    <div style="flex:1;"></div>
    <fluent-button appearance="accent" onclick="Settings.save()">Save</fluent-button>
    <fluent-button onclick="Settings.cancel()">Cancel</fluent-button>
</div>

<!-- Modal -->
<fluent-dialog id="modal" hidden trap-focus modal>
    <div style="padding:16px;">
        <p id="modalText" style="margin:0 0 16px;font-size:13px;"></p>
        <div style="display:flex;justify-content:flex-end;gap:6px;">
            <fluent-button id="modalCancel" hidden onclick="modalResolve(false)">Cancel</fluent-button>
            <fluent-button id="modalOk" appearance="accent" onclick="modalResolve(true)">OK</fluent-button>
        </div>
    </div>
</fluent-dialog>
<script>
let _modalCb = null;
function showModal(text, showCancel) {
    return new Promise(resolve => {
        _modalCb = resolve;
        document.getElementById('modalText').textContent = text;
        document.getElementById('modalCancel').hidden = !showCancel;
        document.getElementById('modal').hidden = false;
    });
}
function modalResolve(val) {
    document.getElementById('modal').hidden = true;
    if (_modalCb) { _modalCb(val); _modalCb = null; }
}
</script>
<script src="https://app.local/js/bridge.js"></script>
<script src="https://app.local/js/settings.js"></script>
</body>
</html>
