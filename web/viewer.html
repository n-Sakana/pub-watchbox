<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Viewer</title>
    <script src="https://app.local/vendor/fluent-web-components.min.js" type="module"></script>
    <link href="https://app.local/vendor/ag-grid.min.css" rel="stylesheet">
    <link href="https://app.local/vendor/ag-theme-alpine.min.css" rel="stylesheet">
    <script src="https://app.local/vendor/ag-grid-community.min.js"></script>
    <script src="https://app.local/vendor/xlsx.full.min.js"></script>
    <script src="https://app.local/vendor/jszip.min.js"></script>
    <script src="https://app.local/vendor/docx-preview.min.js"></script>
    <script src="https://app.local/vendor/marked.min.js"></script>
    <link rel="stylesheet" href="https://app.local/css/app.css">
    <style>
        html, body { height: 100%; overflow: hidden; margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; color: #1a1a1a; }
        body { display: flex; flex-direction: column; background: #fff; }
        .main-area { flex: 1; display: flex; min-height: 0; }
        .left-panel { width: 220px; min-width: 140px; display: flex; flex-direction: column; background: #fafafa; }
        .center-panel { flex: 1; min-width: 180px; border-left: 1px solid #e5e5e5; border-right: 1px solid #e5e5e5; }
        .right-panel { width: 380px; min-width: 200px; display: flex; flex-direction: column; }
        .resizer { width: 4px; cursor: col-resize; background: #e5e5e5; flex-shrink: 0; }
        .resizer:hover, .resizer.active { background: #2563eb; }
        .tree-area { flex: 1; overflow-y: auto; padding: 4px; }

        .top-bar { display: flex; align-items: center; gap: 8px; padding: 6px 10px;
            border-bottom: 1px solid #e5e5e5; background: #fafafa; }
        .top-bar input[type="text"] { flex: 1; padding: 4px 8px; border: 1px solid #d0d0d0;
            border-radius: 4px; font-size: 12px; outline: none; }
        .top-bar input[type="text"]:focus { border-color: #2563eb; }

        .detail-header { padding: 10px 12px; background: #fafafa; font-size: 12px;
            color: #606060; line-height: 1.6; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .detail-body { flex: 1; overflow: auto; min-height: 0; }
        .detail-body-text { padding: 12px; font-size: 13px; white-space: pre-wrap; word-break: break-word; }
        .detail-footer { border-top: 1px solid #eee; flex-shrink: 0; }
        .attach-header { padding: 4px 12px; font-size: 11px; color: #999; background: #fafafa; }
        .attach-list { max-height: 100px; overflow-y: auto; }
        .attach-item { padding: 3px 12px; font-size: 12px; cursor: pointer; }
        .attach-item:hover { background: #f0f0f0; }

        .preview-container { flex: 1; display: flex; flex-direction: column; min-height: 0;
            background: #fff; overflow: hidden; }
        .preview-container iframe { border: none; flex: 1; width: 100%; height: 100%; }
        .preview-container img { max-width: 100%; max-height: 100%; object-fit: contain; margin: auto; }
        .preview-container pre { flex: 1; margin: 0; padding: 12px; overflow: auto;
            font-size: 12px; font-family: Consolas, monospace; white-space: pre-wrap; word-break: break-all; }
        .preview-container table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .preview-container th, .preview-container td { border: 1px solid #e5e5e5; padding: 4px 8px; text-align: left; }
        .preview-container th { background: #fafafa; font-weight: 600; position: sticky; top: 0; }
        .preview-placeholder { display: flex; align-items: center; justify-content: center;
            flex: 1; color: #b0b0b0; font-size: 12px; }

        /* Mail tab bar for attachment preview */
        .mail-tab { padding: 4px 12px; font-size: 11px; background: none; border: none;
            border-bottom: 2px solid transparent; cursor: pointer; color: #808080; }
        .mail-tab:hover { color: #333; }
        .mail-tab.active { border-bottom-color: #2563eb; color: #2563eb; }

        /* Sheet tabs for Excel */
        .sheet-tab { padding: 4px 12px; font-size: 11px; background: none; border: none;
            border-bottom: 2px solid transparent; cursor: pointer; color: #808080; }
        .sheet-tab:hover { color: #333; }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
    <select id="profileSelect" style="width:200px;padding:3px 6px;font-size:12px;border:1px solid #d0d0d0;border-radius:4px;max-height:28px;" onchange="Viewer.onProfileChange()"></select>
    <input id="searchBox" type="text" placeholder="Search..." oninput="Viewer.onSearchInput()">
    <button id="filterToggle" onclick="Viewer.toggleAdvancedFilter()" style="background:none;border:1px solid #d0d0d0;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;" title="Advanced filter">&#x25BC; Filter</button>
    <button onclick="Viewer.refresh()" style="background:none;border:1px solid #d0d0d0;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;" title="Refresh">&#x21BB;</button>
    <span id="statusText" style="font-size:11px;color:#999;white-space:nowrap;">0 items</span>
</div>
<div id="advancedFilter" style="display:none;padding:4px 10px 6px;border-bottom:1px solid #e5e5e5;background:#fafafa;font-size:12px;">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <label style="color:#808080;">From:</label>
        <input id="filterDateFrom" type="date" style="font-size:11px;padding:2px 6px;border:1px solid #d0d0d0;border-radius:4px;" onchange="Viewer.applyFilter()">
        <label style="color:#808080;">To:</label>
        <input id="filterDateTo" type="date" style="font-size:11px;padding:2px 6px;border:1px solid #d0d0d0;border-radius:4px;" onchange="Viewer.applyFilter()">
        <label style="color:#808080;">Sender:</label>
        <input id="filterSender" type="text" placeholder="sender..." style="width:120px;font-size:11px;padding:2px 6px;border:1px solid #d0d0d0;border-radius:4px;" oninput="Viewer.applyFilter()">
        <label style="display:flex;align-items:center;gap:3px;color:#808080;"><input id="filterHasAttach" type="checkbox" onchange="Viewer.applyFilter()"> Has attachment</label>
    </div>
</div>

<!-- Main 3-pane area -->
<div class="main-area">
    <div class="left-panel" id="leftPanel">
        <div style="display:flex;gap:2px;padding:3px 4px;border-bottom:1px solid #e5e5e5;flex-shrink:0;">
            <button onclick="Viewer.expandAllTree()" style="background:none;border:1px solid #d0d0d0;border-radius:3px;padding:1px 6px;font-size:10px;cursor:pointer;" title="Expand all">&#x25BC;</button>
            <button onclick="Viewer.collapseAllTree()" style="background:none;border:1px solid #d0d0d0;border-radius:3px;padding:1px 6px;font-size:10px;cursor:pointer;" title="Collapse all">&#x25B6;</button>
        </div>
        <div class="tree-area" id="treeContainer"></div>
    </div>
    <div class="resizer" id="resizer1"></div>
    <div class="center-panel" id="centerPanel">
        <div id="gridContainer" class="ag-theme-alpine" style="width:100%;height:100%;"></div>
    </div>
    <div class="resizer" id="resizer2"></div>
    <div class="right-panel" id="rightPanel">
        <div class="preview-placeholder" id="emptyState">Select an item to view details</div>

        <!-- Mail detail -->
        <div id="mailDetail" style="display:none;flex-direction:column;height:100%;">
            <div id="mailHeader" class="detail-header"></div>
            <div id="mailBody" class="detail-body">
                <div class="detail-body-text" id="mailBodyText"></div>
            </div>
            <div class="detail-footer">
                <div class="attach-header">Attachments <span style="font-size:10px;color:#bbb;margin-left:8px;">click: preview / dbl-click: open</span></div>
                <div id="attachList" class="attach-list"></div>
            </div>
        </div>

        <!-- Attachment preview -->
        <div id="attachPreviewPanel" style="display:none;flex-direction:column;height:100%;">
            <div style="display:flex;align-items:center;gap:8px;padding:4px 10px;background:#fafafa;border-bottom:1px solid #eee;flex-shrink:0;">
                <fluent-button size="small" onclick="Viewer.closeAttachPreview()">&larr; Back</fluent-button>
                <span id="attachPreviewName" style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
                <fluent-button size="small" onclick="Viewer.openPreviewedAttach()">Open</fluent-button>
            </div>
            <div id="attachPreviewContainer" class="preview-container" style="flex:1;min-height:0;"></div>
        </div>

        <!-- Folder detail -->
        <div id="folderDetail" style="display:none;flex-direction:column;height:100%;">
            <div id="fileInfo" class="detail-header"></div>
            <div class="preview-container" id="previewContainer">
                <div class="preview-placeholder" id="previewEmpty">No preview available</div>
            </div>
        </div>
    </div>
</div>

<div id="contextMenu" style="display:none;position:fixed;z-index:1000;background:#fff;border:1px solid #d0d0d0;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.15);min-width:160px;"></div>

<script src="https://app.local/js/bridge.js"></script>
<script src="https://app.local/js/viewer.js"></script>
<script>
function initResizer(resizerId, panelId, minW, invert) {
    const resizer = document.getElementById(resizerId);
    const panel = document.getElementById(panelId);
    let startX, startW;
    resizer.addEventListener('mousedown', (e) => {
        startX = e.clientX; startW = panel.getBoundingClientRect().width;
        resizer.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        const onMove = (e) => {
            const delta = invert ? startX - e.clientX : e.clientX - startX;
            panel.style.width = Math.max(minW, startW + delta) + 'px';
            panel.style.flex = 'none';
            Viewer.fitColumns();
        };
        const onUp = () => {
            resizer.classList.remove('active');
            document.body.style.cursor = ''; document.body.style.userSelect = '';
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    });
}
initResizer('resizer1', 'leftPanel', 120, false);
initResizer('resizer2', 'rightPanel', 180, true);
window.addEventListener('resize', () => { Viewer.fitColumns(); });
</script>
</body>
</html>
