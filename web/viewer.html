<!DOCTYPE html>
<html data-theme="light">
<head>
    <meta charset="utf-8">
    <title>Viewer</title>
    <link href="https://app.local/vendor/daisyui.css" rel="stylesheet">
    <script src="https://app.local/vendor/tailwind.js"></script>
    <link href="https://app.local/vendor/ag-grid.min.css" rel="stylesheet">
    <link href="https://app.local/vendor/ag-theme-alpine.min.css" rel="stylesheet">
    <script src="https://app.local/vendor/ag-grid-community.min.js"></script>
    <script src="https://app.local/vendor/xlsx.full.min.js"></script>
    <script src="https://app.local/vendor/docx-preview.min.js"></script>
    <script src="https://app.local/vendor/marked.min.js"></script>
    <script src="https://app.local/vendor/jszip.min.js"></script>
    <link rel="stylesheet" href="https://app.local/css/app.css">
    <style>
        html, body { height: 100%; overflow: hidden; }
        body { display: flex; flex-direction: column; }
        .main-area { flex: 1; display: flex; min-height: 0; }
        .left-panel { width: 220px; min-width: 140px; display: flex; flex-direction: column;
            background: oklch(var(--b2)); }
        .center-panel { flex: 1; min-width: 180px; }
        .right-panel { width: 380px; min-width: 200px; display: flex; flex-direction: column; }
        .resizer { width: 4px; cursor: col-resize; background: oklch(var(--bc) / 0.1);
            flex-shrink: 0; transition: background 0.15s; }
        .resizer:hover, .resizer.active { background: oklch(var(--p) / 0.4); }
        .tree-area { flex: 1; overflow-y: auto; padding: 4px; }

        /* Detail panel sections */
        .detail-header { padding: 10px 12px; background: oklch(var(--b2));
            font-size: 12px; color: oklch(var(--bc) / 0.7); line-height: 1.6;
            border-bottom: 1px solid oklch(var(--bc) / 0.08); flex-shrink: 0; }
        .detail-body { flex: 1; overflow: auto; min-height: 0; }
        .detail-body-text { padding: 12px; font-size: 13px; white-space: pre-wrap; word-break: break-word; }
        .detail-footer { border-top: 1px solid oklch(var(--bc) / 0.08); flex-shrink: 0; }
        .attach-header { padding: 4px 12px; font-size: 11px; color: oklch(var(--bc) / 0.5); background: oklch(var(--b2)); }
        .attach-list { max-height: 100px; overflow-y: auto; }
        .attach-item { padding: 3px 12px; font-size: 12px; cursor: pointer; }
        .attach-item:hover { background: oklch(var(--bc) / 0.05); }

        /* Mail tabs */
        .mail-tab { padding: 5px 14px; font-size: 12px; background: none; border: none;
            border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap;
            color: oklch(var(--bc) / 0.5); }
        .mail-tab:hover { color: oklch(var(--bc) / 0.8); }
        .mail-tab.active { border-bottom-color: oklch(var(--p)); color: oklch(var(--p)); font-weight: 500; }

        /* Preview */
        .preview-container { flex: 1; display: flex; flex-direction: column; min-height: 0;
            background: white; overflow: hidden; }
        .preview-container iframe { border: none; flex: 1; width: 100%; }
        .preview-container img { max-width: 100%; max-height: 100%; object-fit: contain; margin: auto; }
        .preview-container pre { flex: 1; margin: 0; padding: 12px; overflow: auto;
            font-size: 12px; font-family: Consolas, monospace; white-space: pre-wrap; word-break: break-all; }
        .preview-container table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .preview-container th, .preview-container td { border: 1px solid oklch(var(--bc) / 0.15);
            padding: 4px 8px; text-align: left; }
        .preview-container th { background: oklch(var(--b2)); font-weight: 600; position: sticky; top: 0; }
        .preview-placeholder { display: flex; align-items: center; justify-content: center;
            flex: 1; color: oklch(var(--bc) / 0.3); font-size: 13px; }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="flex items-center gap-2 px-3 py-2 border-b bg-base-100" style="border-color: oklch(var(--bc) / 0.1);">
    <select id="profileSelect" class="select select-bordered select-sm w-48 shrink-0"
            onchange="Viewer.onProfileChange()"></select>
    <input id="searchBox" type="text" placeholder="Search..."
           class="input input-bordered input-sm flex-1"
           oninput="Viewer.onSearch()">
    <span id="statusText" class="text-xs opacity-50 shrink-0">0 items</span>
</div>

<!-- Main 3-pane area (always) -->
<div class="main-area">
    <!-- Left: folder tree -->
    <div class="left-panel" id="leftPanel">
        <div class="tree-area" id="treeContainer"></div>
    </div>
    <div class="resizer" id="resizer1"></div>

    <!-- Center: item list (AG Grid) -->
    <div class="center-panel" id="centerPanel">
        <div id="gridContainer" class="ag-theme-alpine" style="width:100%;height:100%;"></div>
    </div>
    <div class="resizer" id="resizer2"></div>

    <!-- Right: detail / preview -->
    <div class="right-panel" id="rightPanel">
        <div class="preview-placeholder" id="emptyState">Select an item to view details</div>

        <!-- Mail detail (hidden by default) -->
        <div id="mailDetail" class="flex flex-col h-full hidden">
            <div id="mailHeader" class="detail-header"></div>
            <!-- Tab bar: Body + attachment tabs -->
            <div id="mailTabBar" class="flex shrink-0 overflow-x-auto" style="border-bottom:1px solid oklch(var(--bc) / 0.1);background:oklch(var(--b2));">
                <button class="mail-tab active" data-tab="body" onclick="Viewer.switchMailTab('body')">Body</button>
            </div>
            <!-- Tab content area -->
            <div id="mailTabContent" class="flex-1 min-h-0 overflow-hidden flex flex-col">
                <div id="mailBodyPanel" class="detail-body" style="flex:1;overflow:auto;">
                    <div class="detail-body-text" id="mailBodyText"></div>
                </div>
                <div id="attachPreviewPanel" class="hidden" style="flex:1;display:none;flex-direction:column;min-height:0;">
                    <div id="attachPreviewContainer" class="preview-container" style="flex:1;min-height:0;"></div>
                </div>
            </div>
        </div>

        <!-- Folder detail: file info + preview (hidden by default) -->
        <div id="folderDetail" class="flex flex-col h-full hidden">
            <div id="fileInfo" class="detail-header"></div>
            <div class="preview-container" id="previewContainer">
                <div class="preview-placeholder" id="previewEmpty">No preview available</div>
            </div>
        </div>
    </div>
</div>

<script src="https://app.local/js/bridge.js"></script>
<script src="https://app.local/js/viewer.js"></script>
<script>
// Pane resizer logic
function initResizer(resizerId, leftPanelId, minLeft, minRight) {
    const resizer = document.getElementById(resizerId);
    const left = document.getElementById(leftPanelId);
    let startX, startW;

    resizer.addEventListener('mousedown', (e) => {
        startX = e.clientX;
        startW = left.getBoundingClientRect().width;
        resizer.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';

        const onMove = (e) => {
            const delta = e.clientX - startX;
            const newW = Math.max(minLeft, startW + delta);
            left.style.width = newW + 'px';
            // Refresh AG Grid if it exists
            if (Viewer.gridApi) Viewer.gridApi.sizeColumnsToFit();
        };
        const onUp = () => {
            resizer.classList.remove('active');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    });
}
initResizer('resizer1', 'leftPanel', 120);
initResizer('resizer2', 'centerPanel', 150);
</script>
</body>
</html>
